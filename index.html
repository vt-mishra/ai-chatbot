<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
   <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- PWA -->
    <meta
      name="theme-color"
      content="#0F172A"
    />

    <meta
      name="apple-mobile-web-app-capable"
      content="yes"
    />

    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <meta
      name="mobile-web-app-capable"
      content="yes"
    />

    <!-- SEO -->
    <title>V/S AI</title>

    <meta
      name="description"
      content="V/S AI - modern AI assistant powered by Gemini. Built with React, Tailwind CSS and Google Gemini API by Vatan Mishra."
    />

    <meta
      name="keywords"
      content="AI, Gemini, Chatbot, React, Tailwind, Vatan Mishra"
    />

    <meta
      name="author"
      content="Vatan Mishra"
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="V/S AI"
    />

    <meta
      property="og:description"
      content="Modern AI Assistant built by Vatan Mishra."
    />

    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:image"
      content="/icons/icon-512.png"
    />

    <meta
      name="twitter:card"
      content="summary_large_image"

      name="twitter:title"
      content="V/S AI"
    />

    <meta
      name="twitter:description"
      content="Modern AI Assistant powered by Gemini."
    />
